<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prática Bootstrap</title>

  <!-- Bootstrap 4.6 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <a class="navbar-brand" href="#">Bootstrap Prática</a>
  </nav>

  <div class="container mt-4">

    <h1 class="mb-4">Exemplos Bootstrap</h1>

    <!-- BOTÕES -->
    <h3>Botões</h3>
    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-success">Success</button>
    <button class="btn btn-warning">Warning</button>
    <button class="btn btn-outline-danger">Outline</button>

    <!-- BADGE -->
    <h3 class="mt-4">Badge</h3>
    <button class="btn btn-primary">
      Mensagens <span class="badge badge-light">4</span>
    </button>

    <!-- LIST GROUP -->
    <h3 class="mt-4">List Group</h3>
    <ul class="list-group">
      <li class="list-group-item">Item 1</li>
      <li class="list-group-item">Item 2</li>
      <li class="list-group-item">Item 3</li>
    </ul>

    <!-- ALERTAS -->
    <h3 class="mt-4">Alertas</h3>
    <div class="alert alert-primary">Alerta Primary</div>
    <div class="alert alert-success">Alerta Success</div>
    <div class="alert alert-danger">Alerta Danger</div>

    <!-- ALERTA COM FECHAR -->
    <div class="alert alert-warning alert-dismissible fade show" role="alert">
      Alerta com botão fechar
      <button type="button" class="close" data-dismiss="alert">
        <span>&times;</span>
      </button>
    </div>

    <!-- BARRA DE PROGRESSO -->
    <h3 class="mt-4">Barra de Progresso</h3>
    <div class="progress">
      <div class="progress-bar bg-success" style="width: 50%">
        50%
      </div>
    </div>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
